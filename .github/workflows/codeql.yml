name: CodeQL Security Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:python

      - name: Dump open code scanning alerts to PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Give CodeQL a moment to publish alerts for this SHA.
          sleep 30
          # Pull everything — we'll group per-ref below.
          curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/code-scanning/alerts?state=open&per_page=100" \
            > alerts.json || true
          TOTAL=$(jq 'length' alerts.json 2>/dev/null || echo 0)
          jq -r 'sort_by(.rule.id, .most_recent_instance.location.path, .most_recent_instance.location.start_line) | .[] | "- [" + (.rule.id // "unknown") + "] " + (.most_recent_instance.location.path // "") + ":" + ((.most_recent_instance.location.start_line // 0) | tostring) + " (ref: " + (.most_recent_instance.ref // "?") + ") — " + (.rule.description // .rule.name // "")' alerts.json > summary.txt || true
          {
            echo "### 🛡️ Open code scanning alerts repo-wide (${TOTAL})"
            echo ""
            if [ -s summary.txt ]; then
              echo '```'
              head -c 55000 summary.txt
              echo '```'
            else
              echo "_No open alerts._"
            fi
          } > body.md
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --data "$(jq -Rs '{body: .}' < body.md)" > /dev/null || true
