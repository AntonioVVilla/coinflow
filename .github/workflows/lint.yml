name: Lint & Type Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v1
        with:
          args: check --output-format=github

  mypy:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt mypy types-aiofiles

      - name: Run mypy
        run: |
          mypy bot \
            --ignore-missing-imports \
            --no-strict-optional \
            --exclude 'bot/web/static' \
            --python-version 3.12
